function calcAutoKcal(p) {
  const s = p.gender === 'm' ? 5 : -161;
  const bmr = 10 * p.weightKg + 6.25 * p.heightCm - 5 * p.age + s;
  const actMap = { laag: 1.4, matig: 1.65, hoog: 1.9 };

}

// Resize foto naar max 1280px en converteer naar JPEG ~85%, zodat we niet
// 5 MB+ via de Claude API gooien. Output: { base64, mediaType, dataUrl }.
async function compressImage(file, maxDim = 1280, quality = 0.85) {
  const dataUrl = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = () => rej(new Error('Kon bestand niet lezen'));
    fr.readAsDataURL(file);
  });
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => rej(new Error('Kon afbeelding niet decoderen'));
    i.src = dataUrl;
  });
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const w = Math.round(img.width * scale);
  const h = Math.round(img.height * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  const jpegDataUrl = canvas.toDataURL('image/jpeg', quality);
  return {
    base64: jpegDataUrl.split(',')[1],
    mediaType: 'image/jpeg',
    dataUrl: jpegDataUrl,
  };
}

async function callClaude({ apiKey, system, messages, max_tokens = 4000 }) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens,
      system,
      messages,
    }),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Claude API error ${res.status}: ${txt}`);
  }
  const data = await res.json();
  const text = (data.content || []).filter(c => c.type === 'text').map(c => c.text).join('\n');
  return text;
}

function extractMealData(text) {
  // Prefer a properly-closed block
  const closed = text.match(/```meal_data\s*([\s\S]*?)```/);
  if (closed) {
    try { return JSON.parse(closed[1].trim()); }
    catch (e) { console.warn('JSON parse error (closed)', e); }
  }
  // Fallback: block was truncated — try to parse whatever we have
  const open = text.match(/```meal_data\s*([\s\S]*)$/);
  if (open) {
    let raw = open[1].replace(/```$/, '').trim();
    // Attempt to close open braces/brackets naively
    const opens = (raw.match(/[\{\[]/g) || []).length;
    const closes = (raw.match(/[\}\]]/g) || []).length;
    // Strip trailing partial object (everything after last full item closing)
    try {
      return JSON.parse(raw);
    } catch (_) {
      // try trimming trailing incomplete tokens
      const lastBrace = raw.lastIndexOf('}');
      if (lastBrace > 0) {
        let candidate = raw.slice(0, lastBrace + 1);
        // close any outstanding [ or {
        const o2 = (candidate.match(/[\{\[]/g) || []).length;
        const c2 = (candidate.match(/[\}\]]/g) || []).length;
        candidate = candidate + ']'.repeat(Math.max(0, o2 - c2 - 1)) + '}';
        try { return JSON.parse(candidate); } catch (e) { console.warn('JSON parse error (truncated)', e); }
      }
    }
  }
  return null;
}
// Strip the meal_data block aggressively — even if the closing ``` is missing
// (truncated response), so the raw JSON never leaks into the chat bubble.
function stripMealData(text) {
  return text
    .replace(/```meal_data[\s\S]*?```/g, '')
    .replace(/```meal_data[\s\S]*$/g, '')
    .trim();
}

function useFirebase(config) {
  const [fb, setFb] = useState(null);
  const [uid, setUid] = useState(null);
  const [error, setError] = useState(null);
  const [phase, setPhase] = useState('idle'); // idle | loading-sdk | init | signing-in | ready | error

  useEffect(() => {
    if (!config || !config.apiKey || !config.projectId) { setPhase('idle'); return; }
    let cancelled = false;
    setPhase('loading-sdk');
    function init() {
      if (cancelled) return;
      const F = window._firebase;
      if (!F) {
        window.addEventListener('firebase-ready', init, { once: true });
        return;
      }
      try {
        setPhase('init');
        const app = F.initializeApp(config);
        const auth = F.getAuth(app);
        const db = F.getFirestore(app);
        setPhase('signing-in');
        F.signInAnonymously(auth).catch(err => {
          if (cancelled) return;
          setError('Anonymous sign-in mislukt: ' + err.message + ' — check of Anonymous auth aan staat in Firebase → Authentication → Sign-in method.');
          setPhase('error');
        });
        F.onAuthStateChanged(auth, (u) => {
          if (!cancelled && u) { setUid(u.uid); setFb({ app, auth, db, F }); setPhase('ready'); setError(null); }
        });
      } catch (e) {
        if (!cancelled) { setError(e.message); setPhase('error'); }
      }
    }
    init();
    return () => { cancelled = true; };
  }, [config && config.apiKey, config && config.projectId]);

  return { fb, uid, error, phase };
}

async function saveDay(fb, profileId, date, dayData) {
  const F = fb.F;
  const ref = F.doc(fb.db, 'profiles', profileId, 'days', date);
  await F.setDoc(ref, { ...dayData, updatedAt: F.serverTimestamp() }, { merge: true });
}

async function loadDay(fb, profileId, date) {
  const F = fb.F;
  const ref = F.doc(fb.db, 'profiles', profileId, 'days', date);
  const snap = await F.getDoc(ref);
  return snap.exists() ? snap.data() : null;
}

async function loadMonth(fb, profileId, yyyymm) {
  const F = fb.F;
  const colRef = F.collection(fb.db, 'profiles', profileId, 'days');
  const snap = await F.getDocs(colRef);
  const out = {};
  snap.forEach(d => {
    if (d.id.startsWith(yyyymm)) out[d.id] = d.data();
  });
  return out;
}

/* ----- Profiles CRUD ----- */
async function loadProfiles(fb) {
  const F = fb.F;
  const colRef = F.collection(fb.db, 'profiles');
  const snap = await F.getDocs(colRef);
  const out = [];
  snap.forEach(d => out.push({ id: d.id, ...d.data() }));
  out.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
  return out;
}

async function createProfile(fb, uid, data) {
  const F = fb.F;
  const id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const ref = F.doc(fb.db, 'profiles', id);
  await F.setDoc(ref, {
    ...data,
    createdAt: F.serverTimestamp(),
    updatedAt: F.serverTimestamp(),
    createdByUid: uid || null,
  });
  return id;
}

async function updateProfile(fb, profileId, data) {
  const F = fb.F;
  const ref = F.doc(fb.db, 'profiles', profileId);
  await F.setDoc(ref, { ...data, updatedAt: F.serverTimestamp() }, { merge: true });
}

async function deleteProfile(fb, profileId) {
  const F = fb.F;
  // Delete all days in the subcollection
  const daysRef = F.collection(fb.db, 'profiles', profileId, 'days');
  const snap = await F.getDocs(daysRef);
  await Promise.all(
    snap.docs.map(d => F.deleteDoc(F.doc(fb.db, 'profiles', profileId, 'days', d.id)))
  );
  // Delete the profile document itself
  await F.deleteDoc(F.doc(fb.db, 'profiles', profileId));
}

async function migrateLegacyDays(fb, uid, profileId) {
  // Copies all days from users/{uid}/days/ → profiles/{profileId}/days/
  const F = fb.F;
  const srcCol = F.collection(fb.db, 'users', uid, 'days');
  const snap = await F.getDocs(srcCol);
  let count = 0;
  for (const d of snap.docs) {
    if (d.id.startsWith('_diagnostic_') || d.id === '_diagnostic_') continue;
    const data = d.data();
    const dstRef = F.doc(fb.db, 'profiles', profileId, 'days', d.id);
    await F.setDoc(dstRef, { ...data, migratedFromUid: uid, updatedAt: F.serverTimestamp() }, { merge: true });
    count++;
  }
  return count;
}

async function hasLegacyData(fb, uid) {
  const F = fb.F;
  const srcCol = F.collection(fb.db, 'users', uid, 'days');
  try {
    const snap = await F.getDocs(srcCol);
    let n = 0;
    snap.forEach(d => { if (!d.id.startsWith('_diagnostic_')) n++; });
    return n;
  } catch (_) { return 0; }
}

function NutrientBar({ label, value, target, unit }) {
  const pct = Math.min(100, Math.round((value / Math.max(target, 1)) * 100));
  const over = value > target * 1.1;
  const under = value < target * 0.6;
  const color = over ? 'bg-red-400' : under ? 'bg-amber-400' : 'bg-emerald-500';
  return (
    <div className="mb-2">
      <div className="flex justify-between text-xs text-slate-600 mb-1">
        <span>{label}</span>
        <span className="tabular-nums">
          {Math.round(value)} / {target} {unit}
        </span>
      </div>
      <div className="h-2 bg-slate-200 rounded-full overflow-hidden">
        <div className={`h-full ${color}`} style={{ width: `${pct}%` }} />
      </div>
    </div>
  );
}

function ChatView({ day, onNewEntries, onMessage, targets, profile, history, setHistory, anthropicKey }) {
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const [error, setError] = useState(null);
  const [image, setImage] = useState(null); // { base64, mediaType, dataUrl } | null
  const [imageBusy, setImageBusy] = useState(false);
  const scrollRef = useRef(null);
  const fileInputRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [history, sending]);

  async function handleImagePick(e) {
    const file = e.target.files?.[0];
    e.target.value = ''; // zelfde bestand opnieuw kunnen kiezen
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      setError('Dat is geen afbeelding.');
      return;
    }
    setError(null);
    setImageBusy(true);
    try {
      const compressed = await compressImage(file);
      setImage(compressed);
    } catch (err) {
      console.error(err);
      setError('Kon foto niet verwerken: ' + (err.message || err));
    } finally {
      setImageBusy(false);
    }
  }

  async function send() {
    if ((!input.trim() && !image) || sending) return;
    if (!anthropicKey) { setError('Vul eerst je Anthropic API key in via Instellingen.'); return; }
    const userText = input.trim();
    const sentImage = image;
    setInput('');
    setImage(null);
    setError(null);

    const userMsg = {
      role: 'user',
      content: userText || (sentImage ? '📷 Foto van etiket' : ''),
      ts: Date.now(),
      imagePreview: sentImage ? sentImage.dataUrl : null,
    };
    const newHistory = [...history, userMsg];
    setHistory(newHistory);
    setSending(true);

    try {
      // Context voor Claude
      const todayEntries = (day?.entries || []).map(e =>
        `- ${e.naam} (${e.hoeveelheid}) — ${Math.round(e.kcal)} kcal`
      ).join('\n');

      const tIso = todayISO();
      const contextMsg = `Vandaag: ${tIso} (${formatDateNL(tIso)}).
Profiel: ${profile.gender === 'v' ? 'vrouw' : 'man'}, ${profile.age} jr, ${profile.weightKg} kg.
Dagdoelen: ${targets.kcal} kcal · ${targets.eiwit_g} g eiwit · ${targets.vezels_g} g vezels.
Al geregistreerd vandaag:
${todayEntries || '(nog niks)'}

Nieuwe input van gebruiker:
${userText || (sentImage ? '(zie bijgevoegde foto)' : '')}`;

      // Bouw messages voor Claude (alleen laatste paar user/assistant).
      // Belangrijk: bij assistant-berichten plakken we een "[REEDS GEREGISTREERD: …]"
      // samenvatting achter de reply, zodat Claude in vervolgberichten niet opnieuw
      // dezelfde items uitvoert.
      const claudeMessages = [];
      const tail = newHistory.slice(-8);
      for (const m of tail) {
        if (m.role === 'user' && m === tail[tail.length - 1]) {
          // Laatste user-message: als er een foto bij hoort, multimodale content.
          if (sentImage) {
            claudeMessages.push({
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: sentImage.mediaType, data: sentImage.base64 } },
                { type: 'text', text: contextMsg },
              ],
            });
          } else {
            claudeMessages.push({ role: 'user', content: contextMsg });
          }
        } else if (m.role === 'assistant' && m.mealData && Array.isArray(m.mealData.items) && m.mealData.items.length) {
          const d = m.mealData.datum || todayISO();
          const summary = m.mealData.items
            .map(it => `${it.naam} (${it.hoeveelheid}, ${Math.round(it.kcal || 0)} kcal)`)
            .join('; ');
          claudeMessages.push({
            role: 'assistant',
            content: `${m.content}\n\n[REEDS GEREGISTREERD op ${d}: ${summary}. Deze items zijn definitief opgeslagen in de database. Herhaal ze NIET in "items".]`
          });
        } else {
          claudeMessages.push({ role: m.role, content: m.content });
        }
      }

      const responseText = await callClaude({
        apiKey: anthropicKey,
        system: SYSTEM_PROMPT_BASE,
        messages: claudeMessages,
      });

      const mealData = extractMealData(responseText);
      // Prefer the conversational reply from inside the JSON.
      // Fall back to any text outside the block (stripped) if parsing failed.
      const visibleReply =
        (mealData && mealData.reply && String(mealData.reply).trim())
        || stripMealData(responseText)
        || 'Geregistreerd.';

      const assistantMsg = { role: 'assistant', content: visibleReply, ts: Date.now(), mealData };
      const after = [...newHistory, assistantMsg];
      setHistory(after);
      onMessage(after);

      if (mealData && mealData.status === 'complete' && Array.isArray(mealData.items) && mealData.items.length) {
        // Validate the date field. If missing/invalid, default to today.
        const isoRe = /^\d{4}-\d{2}-\d{2}$/;
        const targetDate = (mealData.datum && isoRe.test(mealData.datum)) ? mealData.datum : todayISO();
        onNewEntries(mealData.items, targetDate);
      }
    } catch (e) {
      console.error(e);
      setError(e.message);
    } finally {
      setSending(false);
    }
  }

  return (
    <div className="flex flex-col flex-1 min-h-0 h-full">
      <div ref={scrollRef} className="flex-1 min-h-0 overflow-y-auto scrollbar-thin p-4 space-y-3">
        {history.length === 0 && (
          <div className="text-center text-slate-500 text-sm mt-8">
            <p className="mb-2">👋 Vertel me wat je vandaag hebt gegeten of gedronken.</p>
            <p className="text-xs">Bv. "boterham met kaas, 8 wafels waarvan 3 met kaas, en een bakje yoghurt"</p>
          </div>
        )}
        {history.map((m, i) => (
          <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
            <div className={`chat-bubble max-w-[85%] rounded-2xl px-4 py-2.5 text-sm ${
              m.role === 'user'
                ? 'bg-emerald-600 text-white rounded-br-sm'
                : 'bg-white text-slate-800 rounded-bl-sm shadow-sm'
            }`}>
              {m.imagePreview && (
                <img
                  src={m.imagePreview}
                  alt="Bijgevoegde foto"
                  className="mb-1.5 rounded-lg max-h-48 w-auto"
                />
              )}
              {m.content}
              {m.mealData && m.mealData.items && m.mealData.items.length > 0 && (() => {
                const dateLabel = (() => {
                  const d = m.mealData.datum;
                  const t = todayISO();
                  if (!d || d === t) return 'vandaag';
                  // Compare against yesterday
                  const y = new Date(); y.setDate(y.getDate() - 1);
                  const yIso = y.toISOString().slice(0, 10);
                  if (d === yIso) return 'gisteren';
                  return shortDateNL(d);
                })();
                return (
                  <div className="mt-2 pt-2 border-t border-slate-200 text-xs text-slate-500">
                    ✓ {m.mealData.items.length} {m.mealData.items.length === 1 ? 'item' : 'items'} toegevoegd aan {dateLabel}
                  </div>
                );
              })()}
            </div>
          </div>
        ))}
        {sending && (
          <div className="flex justify-start">
            <div className="bg-white text-slate-500 rounded-2xl px-4 py-2.5 text-sm shadow-sm">
              <span className="inline-block animate-pulse">Claude denkt na…</span>
            </div>
          </div>
        )}
        {error && (
          <div className="bg-red-50 text-red-700 text-xs rounded-lg p-2">{error}</div>
        )}
      </div>
      <div className="border-t bg-white p-3 chat-input-pb">
        {image && (
          <div className="mb-2 flex items-center gap-2">
            <div className="relative inline-block">
              <img
                src={image.dataUrl}
                alt="Foto van etiket"
                className="h-16 w-16 object-cover rounded-lg border border-slate-200"
              />
              <button
                type="button"
                onClick={() => setImage(null)}
                aria-label="Foto verwijderen"
                className="absolute -top-1.5 -right-1.5 bg-slate-800 hover:bg-slate-900 text-white rounded-full w-5 h-5 text-xs leading-none flex items-center justify-center shadow"
              >
                ×
              </button>
            </div>
            <span className="text-xs text-slate-500">Etiket bijgevoegd — voeg eventueel hoeveelheid toe in tekst.</span>
          </div>
        )}
        <div className="flex gap-2 items-end">
          <input
            ref={fileInputRef}
            type="file"
            accept="image/*"
            capture="environment"
            onChange={handleImagePick}
            className="hidden"
          />
          <button
            type="button"
            onClick={() => fileInputRef.current?.click()}
            disabled={imageBusy || sending}
            aria-label="Etiket scannen met camera"
            title="Etiket scannen"
            className="bg-white border border-slate-300 hover:bg-slate-50 active:bg-slate-100 disabled:opacity-50 text-slate-700 rounded-lg px-3 py-2 text-lg min-h-[48px] min-w-[48px] flex items-center justify-center"
          >
            {imageBusy ? '…' : '📷'}
          </button>
          <textarea
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
            }}
            rows={2}
            placeholder={image ? 'Optioneel: hoeveel heb je ervan gegeten?' : 'Typ wat je gegeten hebt…'}
            className="flex-1 border rounded-lg px-3 py-2 text-base sm:text-sm min-h-[48px] focus:outline-none focus:ring-2 focus:ring-emerald-400 resize-none"
          />
          <button
            onClick={send}
            disabled={sending || (!input.trim() && !image)}
            aria-label="Verstuur bericht"
            className="bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 disabled:bg-slate-300 text-white rounded-lg px-4 sm:px-4 py-2 text-sm font-medium min-h-[48px] min-w-[72px]"
          >
            Stuur
          </button>
        </div>
      </div>
    </div>
  );
}

function CalendarView({ fb, profileId, targets, onSelectDate }) {
  const [cursor, setCursor] = useState(() => {
    const d = new Date();
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  const [days, setDays] = useState({});
  const [loading, setLoading] = useState(false);

  const yyyymm = `${cursor.y}-${String(cursor.m + 1).padStart(2, '0')}`;

  useEffect(() => {
    if (!fb || !profileId) return;
    setLoading(true);
    loadMonth(fb, profileId, yyyymm).then(data => {
      setDays(data);
      setLoading(false);
    });
  }, [fb, profileId, yyyymm]);

  const firstOfMonth = new Date(cursor.y, cursor.m, 1);
  const daysInMonth = new Date(cursor.y, cursor.m + 1, 0).getDate();
  // Maandag = 0
  const startDow = (firstOfMonth.getDay() + 6) % 7;

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${cursor.y}-${String(cursor.m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    cells.push({ d, iso });
  }

  function prev() {
    setCursor(c => c.m === 0 ? { y: c.y - 1, m: 11 } : { y: c.y, m: c.m - 1 });
  }
  function next() {
    setCursor(c => c.m === 11 ? { y: c.y + 1, m: 0 } : { y: c.y, m: c.m + 1 });
  }

  const monthLabel = new Date(cursor.y, cursor.m, 1).toLocaleDateString('nl-NL', { month: 'long', year: 'numeric' });

  // Mobiele lijst: dagen (met data) van nieuw naar oud
  const listDays = cells
    .filter(c => c && days[c.iso])
    .sort((a, b) => b.iso.localeCompare(a.iso));

  return (
    <div className="flex-1 overflow-y-auto scrollbar-thin p-3 sm:p-4">
      <MacroLegend />

      <div className="flex justify-between items-center mb-4 gap-2">
        <button
          onClick={prev}
          aria-label="Vorige maand"
          className="min-w-[44px] min-h-[44px] px-3 rounded-lg hover:bg-slate-200 active:bg-slate-300 text-lg"
        >←</button>
        <h2 className="text-base sm:text-lg font-semibold capitalize text-center flex-1">{monthLabel}</h2>
        <button
          onClick={next}
          aria-label="Volgende maand"
          className="min-w-[44px] min-h-[44px] px-3 rounded-lg hover:bg-slate-200 active:bg-slate-300 text-lg"
        >→</button>
      </div>

      {/* Mobiele lijst (tot md) */}
      <div className="md:hidden space-y-2">
        {listDays.length === 0 && !loading && (
          <div className="text-center text-sm text-slate-500 py-8">
            Geen geregistreerde dagen in {monthLabel.toLowerCase()}.
          </div>
        )}
        {listDays.map(c => (
          <DayListCard
            key={c.iso}
            date={c.iso}
            day={days[c.iso]}
            targets={targets}
            onClick={() => onSelectDate(c.iso)}
          />
        ))}
      </div>

      {/* Desktop grid (md+) */}
      <div className="hidden md:block">
        <div className="grid grid-cols-7 gap-1 text-xs text-slate-500 mb-1">
          {['Ma','Di','Wo','Do','Vr','Za','Zo'].map(d => (
            <div key={d} className="text-center font-medium">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((c, i) => {
            if (!c) return <div key={i} />;
            const day = days[c.iso];
            const totals = day ? sumEntries(day.entries) : null;
            const kcalPctRaw = totals ? Math.round((totals.kcal / Math.max(targets.kcal, 1)) * 100) : 0;
            const kcalPct = Math.min(100, kcalPctRaw);
            const overshoot = kcalPctRaw > 110;
            const isToday = c.iso === todayISO();

            // Macro-kcal aandelen voor de gestapelde balk
            let kSeg = 0, eSeg = 0, vSeg = 0;
            if (totals) {
              const kK = (totals.koolhydraten_g || 0) * 4;
              const eK = (totals.eiwit_g || 0) * 4;
              const vK = (totals.vet_g || 0) * 9;
              const tot = kK + eK + vK;
              if (tot > 0) {
                kSeg = (kK / tot) * 100;
                eSeg = (eK / tot) * 100;
                vSeg = 100 - kSeg - eSeg; // restje t.b.v. afrondingsfout
              }
            }

            return (
              <button
                key={i}
                onClick={() => onSelectDate(c.iso)}
                className={`aspect-square rounded-lg p-1 flex flex-col items-center justify-start text-xs hover:bg-emerald-50 transition ${
                  isToday ? 'ring-2 ring-emerald-500' : 'bg-white shadow-sm'
                }`}
              >
                <div className="font-medium text-slate-700">{c.d}</div>
                {totals && (
                  <>
                    <div className={`text-[10px] mt-0.5 tabular-nums ${overshoot ? 'text-red-500 font-medium' : 'text-slate-500'}`}>
                      {Math.round(totals.kcal)}
                    </div>
                    <div
                      className="w-full h-1.5 bg-slate-200 rounded mt-auto overflow-hidden"
                      title={`${Math.round(totals.kcal)} / ${targets.kcal} kcal · KH ${Math.round(kSeg)}% · E ${Math.round(eSeg)}% · V ${Math.round(vSeg)}%`}
                    >
                      <div className="h-full flex" style={{ width: `${kcalPct}%` }}>
                        <div className="h-full bg-amber-500" style={{ width: `${kSeg}%` }} />
                        <div className="h-full bg-emerald-500" style={{ width: `${eSeg}%` }} />
                        <div className="h-full bg-blue-500" style={{ width: `${vSeg}%` }} />
                      </div>
                    </div>
                  </>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {loading && <div className="text-xs text-slate-400 text-center mt-3">Laden…</div>}
    </div>
  );
}

function DayDetail({ date, day, targets, onClose, onAnalyze, anthropicKey, profile, loading, error, onDelete }) {

  const [analysisLoading, setAnalysisLoading] = useState(false);
  const [q, setQ] = useState('');
  const [analysisErr, setAnalysisErr] = useState(null);

    try {

Items vandaag:
${(day?.entries || []).map(e => `- ${e.naam} (${e.hoeveelheid}) ${Math.round(e.kcal)} kcal`).join('\n')}

Vraag: ${question}`;
      const text = await callClaude({
        apiKey: anthropicKey,
        system: ANALYSIS_SYSTEM,
        messages: [{ role: 'user', content: context }],
      });
      setAnalysis(text);
    } catch (e) { setAnalysisErr(e.message); }
    finally { setAnalysisLoading(false); }

  return (

function WeekAnalysis({ fb, profileId, targets, anthropicKey }) {
  const [result, setResult] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const [range, setRange] = useState('7');

  async function run(customQ) {
    if (!anthropicKey) { setErr('Vul eerst je API key in.'); return; }
    setLoading(true); setErr(null);
    try {
      const n = parseInt(range, 10);
      const rows = [];
      for (let i = 0; i < n; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const iso = d.toISOString().slice(0, 10);
        const day = await loadDay(fb, profileId, iso);
        if (day) {
          const t = sumEntries(day.entries);
          rows.push({ datum: iso, ...t });
        }
      }
      if (rows.length === 0) { setResult('Nog geen data in deze periode.'); setLoading(false); return; }
      const context = `Dagdoelen: ${JSON.stringify(targets)}

Geregistreerde dagen (laatste ${n} dagen):
${rows.map(r => JSON.stringify(r)).join('\n')}

${customQ || `Geef een analyse over deze periode: gemiddeldes, trends, sterke en zwakke punten, en 2 concrete verbeterpunten.`}`;
      const text = await callClaude({
        apiKey: anthropicKey,
        system: ANALYSIS_SYSTEM,
        messages: [{ role: 'user', content: context }],
        max_tokens: 2000,
      });
      setResult(text);
    } catch (e) { setErr(e.message); }
    finally { setLoading(false); }
  }

  return (
    <div className="flex-1 min-h-0 overflow-y-auto scrollbar-thin p-4 space-y-3">
      <div className="bg-white rounded-xl p-4 shadow-sm">
        <h2 className="font-semibold text-slate-800 mb-3">Periode-analyse</h2>
        <div className="flex items-center gap-2 mb-3">
          <label className="text-sm text-slate-600">Periode:</label>
          <select value={range} onChange={e => setRange(e.target.value)} className="border rounded px-2 py-1 text-sm">
            <option value="7">7 dagen</option>
            <option value="14">14 dagen</option>
            <option value="30">30 dagen</option>
          </select>
          <button onClick={() => run()} className="bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg px-3 py-1 text-sm">
            Maak analyse
          </button>
        </div>
        <div className="flex flex-wrap gap-2">
          <button onClick={() => run('Hoe is mijn eiwitinname deze week?')} className="text-xs bg-emerald-100 hover:bg-emerald-200 text-emerald-800 rounded-full px-3 py-1">Eiwit deze week</button>
          <button onClick={() => run('Drink ik genoeg water en zijn er patronen?')} className="text-xs bg-emerald-100 hover:bg-emerald-200 text-emerald-800 rounded-full px-3 py-1">Water & patronen</button>
          <button onClick={() => run('Op welke dagen zat ik ruim onder mijn caloriedoel?')} className="text-xs bg-emerald-100 hover:bg-emerald-200 text-emerald-800 rounded-full px-3 py-1">Lage dagen</button>
        </div>
        {loading && <div className="text-xs text-slate-400 mt-3">Bezig…</div>}
        {err && <div className="text-xs text-red-600 mt-2">{err}</div>}
        {result && (
          <div className="mt-4 bg-slate-50 rounded-lg p-3 text-sm text-slate-700 whitespace-pre-wrap">
            {result}
          </div>
        )}
      </div>
    </div>
  );
}

function Settings({ anthropicKey, setAnthropicKey, firebaseConfig, setFirebaseConfig, profile, setProfile, fbStatus, fb, uid, hideProfile, onSwitchProfile }) {
  const [rawFb, setRawFb] = useState(() => firebaseConfig ? JSON.stringify(firebaseConfig, null, 2) : '');
  const [fbErr, setFbErr] = useState(null);
  const [testResult, setTestResult] = useState(null);
  const [testing, setTesting] = useState(false);

  async function testFirebase() {
    setTesting(true);
    setTestResult(null);
    try {
      if (!fb || !uid) throw new Error('Firebase is nog niet verbonden (uid ontbreekt). Wacht even of check Anonymous auth.');
      const F = fb.F;
      const testId = '_diagnostic_' + Date.now();
      const ref = F.doc(fb.db, 'users', uid, 'days', testId);
      await F.setDoc(ref, { test: true, at: F.serverTimestamp() }, { merge: true });
      const snap = await F.getDoc(ref);
      if (!snap.exists()) throw new Error('Schrijven lijkt gelukt maar lezen geeft geen document terug.');
      setTestResult({ ok: true, msg: `Gelukt. Firebase werkt correct.\n(Doc geschreven en gelezen onder users/${uid}/days/${testId}.)` });
    } catch (e) {
      let msg = e.message || String(e);
      if (/permission|PERMISSION_DENIED/i.test(msg)) {
        msg += '\n\n→ Je Firestore-rules blokkeren deze write. Vervang de rules met de versie uit de README (match /users/{uid}/{document=**} met auth-check).';
      } else if (/auth/i.test(msg) && /anonymous/i.test(msg)) {
        msg += '\n\n→ Zet Anonymous sign-in aan in Firebase → Authentication → Sign-in method.';
      }
      setTestResult({ ok: false, msg });
    } finally { setTesting(false); }
  }

  function saveFb() {
    // Tolerant parse: accept both strict JSON and Firebase-style JS object
    // (unquoted keys, single quotes, trailing commas, "const firebaseConfig =" prefix).
    function tolerantParse(s) {
      const trimmed = s.trim();
      if (!trimmed) throw new Error('leeg');
      try { return JSON.parse(trimmed); } catch (_) {}
      const fixed = trimmed
        .replace(/^\s*(?:const|let|var)\s+\w+\s*=\s*/, '')  // strip "const firebaseConfig ="
        .replace(/;\s*$/, '')                                // strip trailing ;
        .replace(/\/\/.*$/gm, '')                            // strip // comments
        .replace(/\/\*[\s\S]*?\*\//g, '')                    // strip /* */ comments
        .replace(/([\{,]\s*)([A-Za-z_$][\w$]*)\s*:/g, '$1"$2":')  // quote bare keys
        .replace(/'/g, '"')                                   // single -> double quotes
        .replace(/,(\s*[\}\]])/g, '$1');                      // trailing commas
      return JSON.parse(fixed);
    }
    try {
      const parsed = tolerantParse(rawFb);
      if (!parsed || !parsed.apiKey || !parsed.projectId) {
        throw new Error('mist apiKey of projectId');
      }
      setFirebaseConfig(parsed);
      setFbErr(null);
    } catch (e) {
      setFbErr('Kon config niet lezen: ' + e.message);
    }
  }

  return (
    <div className="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-4 max-w-2xl mx-auto w-full">
      {!hideProfile && (
        <div className="bg-white rounded-xl p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3 gap-3">
            <h2 className="font-semibold text-slate-800 flex items-center gap-2">
              <span className="text-2xl">{profile.icon || '🙂'}</span>
              <span>Profiel van {profile.name || '…'}</span>
            </h2>
            {onSwitchProfile && (
              <button onClick={onSwitchProfile} className="text-xs text-emerald-700 hover:text-emerald-900 underline">Ander profiel kiezen</button>
            )}
          </div>
          <div className="mb-3">
            <span className="text-slate-600 text-sm">Icoon</span>
            <div className="mt-1 flex flex-wrap gap-1.5">
              {EMOJI_ICONS.map(e => (
                <button
                  key={e}
                  type="button"

function MacroDonut({ eiwit = 0, koolhydraten = 0, vet = 0, size = 48, stroke = 6 }) {
  // kcal contribution per macro
  const eK = (eiwit || 0) * 4;
  const kK = (koolhydraten || 0) * 4;
  const vK = (vet || 0) * 9;
  const total = eK + kK + vK;
  const r = (size - stroke) / 2;
  const C = 2 * Math.PI * r;
  const segs = total > 0
    ? [
        { val: kK / total, color: '#f59e0b' }, // koolhydraten – amber
        { val: eK / total, color: '#10b981' }, // eiwit – emerald
        { val: vK / total, color: '#3b82f6' }, // vet – blue
      ]
    : [];
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} aria-hidden="true">
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e7eb" strokeWidth={stroke} />
      {segs.map((s, i) => {
        const len = s.val * C;
        const dash = `${len} ${C - len}`;
        const el = (
          <circle
            key={i}
            cx={size/2} cy={size/2} r={r}
            fill="none" stroke={s.color} strokeWidth={stroke}
            strokeDasharray={dash}
            strokeDashoffset={-offset}
            strokeLinecap="butt"
            transform={`rotate(-90 ${size/2} ${size/2})`}
          />
        );
        offset += len;
        return el;
      })}
    </svg>
  );
}

function DayListCard({ date, day, targets, onClick }) {

function App() {
  const [anthropicKey, setAnthropicKeyState] = useState(() => localStorage.getItem(LS_KEYS.anthropicKey) || '');
  const [firebaseConfig, setFirebaseConfigState] = useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem(LS_KEYS.firebaseConfig) || 'null');
      return stored || DEFAULT_FIREBASE_CONFIG;
    }
    catch { return DEFAULT_FIREBASE_CONFIG; }
  });
  const [activeProfileId, setActiveProfileIdState] = useState(() => localStorage.getItem(LS_KEYS.activeProfileId) || null);

  const setAnthropicKey = (v) => { setAnthropicKeyState(v); localStorage.setItem(LS_KEYS.anthropicKey, v); };
  const setFirebaseConfig = (v) => { setFirebaseConfigState(v); localStorage.setItem(LS_KEYS.firebaseConfig, JSON.stringify(v)); };
  const setActiveProfileId = (v) => {
    setActiveProfileIdState(v);
    if (v) localStorage.setItem(LS_KEYS.activeProfileId, v);
    else localStorage.removeItem(LS_KEYS.activeProfileId);
  };

  const { fb, uid, error: fbError, phase: fbPhase } = useFirebase(firebaseConfig);
  const [saveError, setSaveError] = useState(null);

  // Profile state
  const [profiles, setProfiles] = useState([]);
  const [profilesLoading, setProfilesLoading] = useState(false);
  const [profilesError, setProfilesError] = useState(null);
  const [pickerMode, setPickerMode] = useState('pick'); // pick | editor | manage
  const [editingProfile, setEditingProfile] = useState(null); // object when editing; null when creating
  const [profileSaveError, setProfileSaveError] = useState(null);
  const [profileSaving, setProfileSaving] = useState(false);
  const [legacyDayCount, setLegacyDayCount] = useState(0);

  const activeProfile = useMemo(
    () => profiles.find(p => p.id === activeProfileId) || null,
    [profiles, activeProfileId]
  );
  const targets = useMemo(
    () => activeProfile ? calcDailyTargets(activeProfile) : calcDailyTargets(DEFAULT_PROFILE),
    [activeProfile]
  );

  // Load profiles once Firebase is ready
  useEffect(() => {
    if (!fb || !uid) return;
    setProfilesLoading(true);
    setProfilesError(null);
    loadProfiles(fb)
      .then(async (list) => {
        setProfiles(list);
        if (list.length === 0) {
          // Check for legacy data under users/{uid}/days/ so we can offer migration
          const n = await hasLegacyData(fb, uid);
          setLegacyDayCount(n);
        }
        setProfilesLoading(false);
      })
      .catch(e => {
        console.error('loadProfiles failed', e);
        setProfilesError(e.message || String(e));
        setProfilesLoading(false);
      });
  }, [fb, uid]);

  // If activeProfileId references a profile that doesn't exist (anymore), clear it
  useEffect(() => {
    if (activeProfileId && profiles.length > 0 && !profiles.find(p => p.id === activeProfileId)) {
      setActiveProfileId(null);
    }
  }, [profiles, activeProfileId]);

  async function refreshProfiles() {
    if (!fb) return;
    const list = await loadProfiles(fb);
    setProfiles(list);
    return list;
  }

  async function handleSaveProfile(data, doMigrate) {
    setProfileSaving(true); setProfileSaveError(null);
    try {
      let id = editingProfile?.id;
      if (id) {
        await updateProfile(fb, id, data);
      } else {
        id = await createProfile(fb, uid, data);
        if (doMigrate && legacyDayCount > 0) {
          await migrateLegacyDays(fb, uid, id);
          setLegacyDayCount(0);
        }
      }
      const list = await refreshProfiles();
      setActiveProfileId(id);
      setEditingProfile(null);
      setPickerMode('pick');
      setProfileSaving(false);
    } catch (e) {
      console.error('saveProfile failed', e);
      setProfileSaveError(e.message || String(e));
      setProfileSaving(false);
    }
  }

  async function handleDeleteProfile(p) {
    try {
      await deleteProfile(fb, p.id);
      if (activeProfileId === p.id) setActiveProfileId(null);
      await refreshProfiles();
    } catch (e) {
      alert('Verwijderen mislukt: ' + (e.message || e));
    }
  }

  // ---- Day data for active profile ----
  const [view, setView] = useState('chat'); // chat | calendar | week | settings
  const [today, setToday] = useState(null);
  const [history, setHistory] = useState([]);
  const [selectedDate, setSelectedDate] = useState(null);
  const [selectedDay, setSelectedDay] = useState(null);
  const [mobileSheetOpen, setMobileSheetOpen] = useState(false);
  const todayTotals = useMemo(() => sumEntries(today?.entries || []), [today]);

  // Load today whenever active profile changes
  useEffect(() => {
    if (!fb || !activeProfileId) { setToday(null); setHistory([]); return; }
    loadDay(fb, activeProfileId, todayISO()).then(d => {
      setToday(d || { entries: [], messages: [] });
      setHistory((d && d.messages) || []);
    }).catch(e => {
      console.error('loadDay (today) failed', e);
      setToday({ entries: [], messages: [] });
    });
  }, [fb, activeProfileId]);

  // Select another date
  const [selectedDayLoading, setSelectedDayLoading] = useState(false);
  const [selectedDayError, setSelectedDayError] = useState(null);
  useEffect(() => {
    if (!selectedDate) { setSelectedDay(null); setSelectedDayError(null); return; }
    if (selectedDate === todayISO()) {
      setSelectedDay(today || { entries: [] });
      setSelectedDayError(null);
      return;
    }
    if (!fb || !activeProfileId) return;
    setSelectedDayLoading(true);
    setSelectedDayError(null);
    loadDay(fb, activeProfileId, selectedDate)
      .then(d => { setSelectedDay(d || { entries: [] }); setSelectedDayLoading(false); })
      .catch(e => {
        console.error('loadDay failed', e);
        setSelectedDay({ entries: [] });
        setSelectedDayError(e.message || String(e));
        setSelectedDayLoading(false);
      });
  }, [fb, activeProfileId, selectedDate, today]);

  // Merge nieuwe items in bestaande entries. Items met vervangt_vorige:true
  // vervangen de meest recente entry op dezelfde dag met dezelfde (genormaliseerde)
  // naam. Valt er niks te vervangen, dan wordt het alsnog toegevoegd.
  function mergeEntries(existing, incoming) {
    const norm = s => String(s || '').toLowerCase().replace(/\s+/g, ' ').trim();
    const out = [...existing];
    for (const raw of incoming) {
      const { vervangt_vorige, ...item } = raw;
      const stamped = { ...item, ts: Date.now() };
      if (vervangt_vorige) {
        // Zoek van achter naar voren de laatste match op naam
        const target = norm(item.naam);
        let replaced = false;
        for (let i = out.length - 1; i >= 0; i--) {
          if (norm(out[i].naam) === target) {
            out[i] = stamped;
            replaced = true;
            break;
          }
        }
        if (!replaced) out.push(stamped); // fallback: alsnog toevoegen
      } else {
        out.push(stamped);
      }
    }
    return out;
  }

  async function handleNewEntries(items, targetDate) {
    const date = targetDate || todayISO();

    if (!fb || !activeProfileId) {
      setSaveError('Niet opgeslagen: geen actief profiel of Firebase niet verbonden.');
      return;
    }

    if (date === todayISO()) {
      // Vandaag: update lokaal today-state direct voor snelle UI-feedback
      const newEntries = mergeEntries(today?.entries || [], items);
      setToday({ ...(today || {}), entries: newEntries });
      try {
        await saveDay(fb, activeProfileId, date, { entries: newEntries });
        setSaveError(null);
      } catch (e) {
        console.error('saveDay failed', e);
        setSaveError('Opslaan mislukt: ' + (e.message || String(e)));
      }
      return;
    }

    // Andere dag: laad die dag, merge, sla op
    try {
      const existing = (await loadDay(fb, activeProfileId, date)) || { entries: [] };
      const newEntries = mergeEntries(existing.entries || [], items);
      await saveDay(fb, activeProfileId, date, { entries: newEntries });
      // Als deze dag op dat moment open is in het detailmodaal: update dat óók
      if (selectedDate === date) {
        setSelectedDay({ ...(existing || {}), entries: newEntries });
      }
      setSaveError(null);
    } catch (e) {
      console.error('saveDay (other day) failed', e);
      setSaveError(`Opslaan mislukt voor ${date}: ` + (e.message || String(e)));
    }
  }
  async function handleDeleteEntry(date, index) {
    const isToday = date === todayISO();
    const source = isToday ? today : selectedDay;
    if (!source || !Array.isArray(source.entries)) return;
    const newEntries = source.entries.filter((_, i) => i !== index);
    if (isToday) {
      setToday({ ...(today || {}), entries: newEntries });
    }
    if (selectedDate === date) {
      setSelectedDay({ ...(selectedDay || {}), entries: newEntries });
    }
    if (!fb || !activeProfileId) {
      setSaveError('Niet opgeslagen: geen actief profiel of Firebase niet verbonden.');
      return;
    }
    try {
      await saveDay(fb, activeProfileId, date, { entries: newEntries });
      setSaveError(null);
    } catch (e) {
      console.error('saveDay failed', e);
      setSaveError('Opslaan mislukt: ' + (e.message || String(e)));
    }
  }
  async function handleMessages(msgs) {
    if (!fb || !activeProfileId) return;
    await saveDay(fb, activeProfileId, todayISO(), { messages: msgs });
  }

  // Save edits to the active profile (from Settings).
  // Optimistic local update + debounced remote save, so every keystroke
  // doesn't trigger a Firestore write.
  const saveProfileTimer = useRef(null);
  function handleUpdateActiveProfile(next) {
    if (!activeProfileId) return;
    // Optimistic local update so inputs stay in sync between keystrokes
    setProfiles(ps => ps.map(p => p.id === activeProfileId ? { ...p, ...next } : p));
    if (!fb) return;
    clearTimeout(saveProfileTimer.current);
    saveProfileTimer.current = setTimeout(async () => {
      try {
        await updateProfile(fb, activeProfileId, next);
      } catch (e) {
        console.error('updateProfile failed', e);
        setSaveError('Profiel opslaan mislukt: ' + (e.message || e));
      }
    }, 600);
  }

  const fbStatus = !firebaseConfig
    ? 'niet geconfigureerd'
    : fbError
      ? `fout: ${fbError}`
      : uid
        ? 'connected'
        : `verbinden… (${fbPhase})`;
  const needsConfig = !anthropicKey || !firebaseConfig;

  // ----- Startup screens: config gate + profile picker -----

  // 1. Missing API key (of onverhoopt geen Firebase config) → force Settings screen
  if (needsConfig) {
    const missing = [];
    if (!anthropicKey) missing.push('Anthropic API key');
    if (!firebaseConfig) missing.push('Firebase config');
    return (
      <div className="flex flex-col h-dvh max-w-3xl mx-auto bg-slate-100">
        <header className="bg-white border-b px-4 py-3">
          <h1 className="font-bold text-slate-800">🥗 Bordwijzer</h1>
          <div className="text-xs text-slate-500">Eerst even instellen…</div>
        </header>
        <div className="bg-amber-100 text-amber-800 text-sm px-4 py-2 border-b border-amber-200">
          ⚠ Vul je {missing.join(' en ')} in om te beginnen.
        </div>
        <main className="flex-1 overflow-y-auto">
          <Settings
            anthropicKey={anthropicKey}
            setAnthropicKey={setAnthropicKey}
            firebaseConfig={firebaseConfig}
            setFirebaseConfig={setFirebaseConfig}
            profile={activeProfile || DEFAULT_PROFILE}
            setProfile={handleUpdateActiveProfile}
            fbStatus={fbStatus}
            fb={fb}
            uid={uid}
            hideProfile={!activeProfile}
          />
        </main>
      </div>
    );
  }

  // 2. Firebase not ready yet
  if (!fb || !uid) {
    return (
      <div className="min-h-dvh bg-slate-900 flex flex-col items-center justify-center p-6 text-slate-300">
        <div className="text-4xl mb-3">🥗</div>
        <div className="text-sm">
          {fbPhase === 'error' ? '🛑 Firebase-fout' : 'Verbinden met Firebase…'}
        </div>
        {fbError && (
          <div className="mt-3 bg-red-900/40 text-red-200 text-xs rounded p-3 max-w-md">
            {fbError}
          </div>
        )}
      </div>
    );
  }

  // 3. Profile picker / editor / manager
  if (!activeProfileId) {
    if (pickerMode === 'editor') {
      const isFirst = profiles.length === 0;
      return (
        <ProfileEditor
          initial={editingProfile || (isFirst ? { name: 'Job', icon: '🦊' } : null)}
          isFirstProfile={isFirst}
          legacyDayCount={isFirst ? legacyDayCount : 0}
          onSave={handleSaveProfile}
          onCancel={() => {
            setEditingProfile(null);
            setPickerMode(profiles.length === 0 ? 'editor' : 'pick');
          }}
          saving={profileSaving}
          error={profileSaveError}
        />
      );
    }
    if (pickerMode === 'manage') {
      return (
        <ProfileManager
          profiles={profiles}
          onBack={() => setPickerMode('pick')}
          onEdit={(p) => { setEditingProfile(p); setPickerMode('editor'); }}
          onDelete={handleDeleteProfile}
        />
      );
    }
    // 'pick' (auto-open editor if no profiles)
    if (!profilesLoading && profiles.length === 0) {
      return (
        <ProfileEditor
          initial={{ name: 'Job', icon: '🦊' }}
          isFirstProfile={true}
          legacyDayCount={legacyDayCount}
          onSave={handleSaveProfile}
          onCancel={() => {}}
          saving={profileSaving}
          error={profileSaveError}
        />
      );
    }
    return (
      <ProfilePicker
        profiles={profiles}
        loading={profilesLoading}
        onSelect={(p) => setActiveProfileId(p.id)}
        onAdd={() => { setEditingProfile(null); setPickerMode('editor'); }}
        onEdit={() => setPickerMode('manage')}
      />
    );
  }

  // 4. Main app with active profile
  return (
    <div className="flex flex-col h-dvh max-w-3xl mx-auto bg-slate-100">
      <header className="bg-white border-b px-3 sm:px-4 py-3 flex items-center justify-between gap-2 sm:gap-3 safe-pt">
        <div className="flex items-center gap-2 sm:gap-3 min-w-0 flex-1">
          <button
            onClick={() => setActiveProfileId(null)}
            title="Ander profiel kiezen"
            aria-label="Ander profiel kiezen"
            className="w-11 h-11 shrink-0 rounded-lg bg-slate-100 hover:bg-emerald-100 active:bg-emerald-200 flex items-center justify-center text-2xl transition"
          >
            {activeProfile?.icon || '🙂'}
          </button>
          <div className="min-w-0">
            <h1 className="font-bold text-slate-800 truncate text-base sm:text-lg">{activeProfile?.name || 'Profiel'}</h1>
            <div className="text-xs text-slate-500 capitalize truncate">{formatDateNL(todayISO())}</div>
          </div>
        </div>
        <nav className="flex gap-0.5 sm:gap-1 text-sm shrink-0">
          <button onClick={() => setView('chat')} aria-label="Chat" className={`min-h-[44px] min-w-[44px] px-2 sm:px-3 py-1.5 rounded-lg ${view==='chat'?'bg-emerald-600 text-white':'hover:bg-slate-200 active:bg-slate-300'}`}>💬<span className="hidden sm:inline ml-1">Chat</span></button>
          <button onClick={() => setView('calendar')} aria-label="Kalender" className={`min-h-[44px] min-w-[44px] px-2 sm:px-3 py-1.5 rounded-lg ${view==='calendar'?'bg-emerald-600 text-white':'hover:bg-slate-200 active:bg-slate-300'}`}>📅<span className="hidden sm:inline ml-1">Kalender</span></button>
          <button onClick={() => setView('week')} aria-label="Analyse" className={`min-h-[44px] min-w-[44px] px-2 sm:px-3 py-1.5 rounded-lg ${view==='week'?'bg-emerald-600 text-white':'hover:bg-slate-200 active:bg-slate-300'}`}>📊<span className="hidden sm:inline ml-1">Analyse</span></button>
          <button onClick={() => setView('settings')} aria-label="Instellingen" className={`min-h-[44px] min-w-[44px] px-2 sm:px-3 py-1.5 rounded-lg ${view==='settings'?'bg-emerald-600 text-white':'hover:bg-slate-200 active:bg-slate-300'}`}>⚙</button>
        </nav>
      </header>

      {saveError && (
        <div className="bg-red-100 text-red-800 text-sm px-4 py-2 border-b border-red-200 flex items-start justify-between gap-3">
          <div>🛑 {saveError}</div>
          <button onClick={() => setSaveError(null)} aria-label="Melding sluiten" className="min-w-[44px] min-h-[44px] text-red-600 hover:text-red-900 font-bold text-xl">×</button>
        </div>
      )}

      <main className="flex-1 min-h-0 overflow-hidden flex flex-col">
        {view === 'chat' && (
          <div className="flex-1 min-h-0 flex flex-col md:flex-row overflow-hidden">
            <div className="flex-1 min-h-0 flex flex-col overflow-hidden">
              {/* Mobiele pill: dagtotalen openen */}
              <button
                onClick={() => setMobileSheetOpen(true)}
                className="md:hidden flex items-center justify-between gap-2 px-4 py-3 bg-white border-b text-sm min-h-[48px] active:bg-slate-50"
                aria-label="Dagtotalen openen"
              >
                <span className="font-medium text-slate-700">Dagtotalen</span>
                <span className="flex items-center gap-2 text-slate-600 tabular-nums">
                  <MacroDonut eiwit={todayTotals.eiwit_g||0} koolhydraten={todayTotals.koolhydraten_g||0} vet={todayTotals.vet_g||0} size={24} stroke={3} />
                  {Math.round(todayTotals.kcal || 0)} / {targets.kcal} kcal
                  <span className="text-slate-400">↑</span>
                </span>
              </button>

              <ChatView
                day={today}
                onNewEntries={handleNewEntries}
                onMessage={handleMessages}
                targets={targets}
                profile={activeProfile}
                history={history}
                setHistory={setHistory}
                anthropicKey={anthropicKey}
              />
            </div>
            {/* Desktop-only zijbalk */}
            <aside className="hidden md:block md:w-80 md:border-l bg-slate-50 overflow-y-auto scrollbar-thin p-3 space-y-3">
              <DaySummary day={today} targets={targets} />
              <div>
                <h3 className="font-semibold text-slate-800 mb-2 text-sm">Items vandaag</h3>
                <EntriesList
                  entries={today?.entries}
                  onDelete={(i) => handleDeleteEntry(todayISO(), i)}
                />
              </div>
            </aside>

            {/* Mobiele bottom sheet met dezelfde content */}
            {mobileSheetOpen && (
              <MobileSheet title="Vandaag" onClose={() => setMobileSheetOpen(false)}>
                <DaySummary day={today} targets={targets} />
                <div>
                  <h3 className="font-semibold text-slate-800 mb-2 text-sm">Items vandaag</h3>
                  <EntriesList
                    entries={today?.entries}
                    onDelete={(i) => handleDeleteEntry(todayISO(), i)}
                  />
                </div>
              </MobileSheet>
            )}
          </div>
        )}

        {view === 'calendar' && (
          <CalendarView
            fb={fb}
            profileId={activeProfileId}
            targets={targets}
            onSelectDate={setSelectedDate}
          />
        )}

        {view === 'week' && (
          <WeekAnalysis fb={fb} profileId={activeProfileId} targets={targets} anthropicKey={anthropicKey} />
        )}

        {view === 'settings' && (
          <Settings
            anthropicKey={anthropicKey}
            setAnthropicKey={setAnthropicKey}
            firebaseConfig={firebaseConfig}
            setFirebaseConfig={setFirebaseConfig}
            profile={activeProfile || DEFAULT_PROFILE}
            setProfile={handleUpdateActiveProfile}
            fbStatus={fbStatus}
            fb={fb}
            uid={uid}
            onSwitchProfile={() => setActiveProfileId(null)}
          />
        )}
      </main>

      {selectedDate && (
        <DayDetail
          date={selectedDate}
          day={selectedDay}
          targets={targets}
          onClose={() => setSelectedDate(null)}
          anthropicKey={anthropicKey}
          profile={activeProfile}
          loading={selectedDayLoading}
          error={selectedDayError}
          onDelete={(i) => handleDeleteEntry(selectedDate, i)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
